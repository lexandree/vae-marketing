name: vae-marketing-finetuning
project: vae_marketing
program: main.py
method: bayes # Используем байесовский поиск для более точной настройки
metric:
  name: loss
  goal: minimize
parameters:
  latent-dim:
    values: [64, 128, 256] # Проверим, поможет ли еще большее пространство
  beta:
    distribution: uniform
    min: 0.0001
    max: 0.0008 # Сфокусировались на лучшем диапазоне
  batch-size:
    value: 1024 # Зафиксировали лучший результат
  lr:
    distribution: uniform
    min: 0.001
    max: 0.003
  epochs:
    value: 30 # Увеличили для более точной оценки
  anneal-end:
    values: [5, 10, 15]
  arch:
    value: "beta_vae"
command:
  - ${interpreter}
  - ${program}
  - "train"
  - "--data"
  - "data/processed_full/train.parquet"
  - "--vocab"
  - "data/processed_full/vocabulary.json"
  - "--wandb"
  - "--verbosity"
  - "0"
  - ${args}

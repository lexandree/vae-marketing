name: vae-marketing-fast-hpo
project: vae_marketing
program: main.py
method: random
metric:
  name: loss
  goal: minimize
parameters:
  latent-dim:
    values: [32, 64, 128]
  beta:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.5
  batch-size:
    values: [1024, 2048, 4096]
  lr:
    distribution: log_uniform_values
    min: 1e-4
    max: 5e-3
  epochs:
    value: 20
  arch:
    value: "beta_vae"
command:
  - ${interpreter}
  - ${program}
  - "train"
  - "--data"
  - "data/processed_full/train.parquet"
  - "--vocab"
  - "data/processed_full/vocabulary.json"
  - "--wandb"
  - "--verbosity"
  - "0" # Делаем свип максимально тихим
  - ${args}

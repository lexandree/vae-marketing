name: vae-marketing-hpo
project: vae_marketing
method: random # Случайный поиск эффективнее сетки для многих параметров
metric:
  name: loss
  goal: minimize
parameters:
  latent-dim:
    values: [16, 32, 64, 128]
  beta:
    distribution: uniform
    min: 0.1
    max: 5.0
  anneal-end:
    values: [0, 5, 10]
  lr:
    distribution: log_uniform_values
    min: 1e-4
    max: 5e-3
  epochs:
    value: 15
  arch:
    value: "beta_vae"
command:
  - ${interpreter}
  - ${program}
  - "train"
  - "--data"
  - "data/processed_full/train.parquet"
  - "--vocab"
  - "data/processed_full/vocabulary.json"
  - "--wandb"
  - ${args}
